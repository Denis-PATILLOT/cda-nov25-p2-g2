# Modifie les infos d'un utilisateur existant (nom, prénom, email, téléphone, avatar, groupe)
# Utilisé dans : parents/[id]/edit.tsx (sauvegarde des infos du parent)
# staff/[id]/edit.tsx (sauvegarde des infos du membre du staff, avec group_id)
mutation AdminUpdateUser($data: UpdateUserInput!) {
  updateUser(data: $data) {
    id
    first_name
    last_name
    email
    phone
    avatar
  }
}
