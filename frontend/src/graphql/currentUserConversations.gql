query CurrentUserConversations {
  myConversations {
    id
    creationDate
    initiator {
      id
      first_name
      last_name
      role
      children {
        firstName
        lastName
        group {
          id
        }
      }
      
    }
    participant {
      id
      first_name
      last_name
      role
      children {
        firstName
        lastName
        group {
          id
        }
      }
    }
  }
}